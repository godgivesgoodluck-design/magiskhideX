name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v1.1.0)'
        required: true
        type: string
      release_notes:
        description: 'Release notes (optional)'
        required: false
        default: 'Bug fixes and improvements.'

jobs:
  release:
    name: Tag & Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup NDK r25c
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25c
          add-to-path: true

      - name: Install tools
        run: sudo apt-get install -y cmake ninja-build zip -qq

      - name: Download zygisk.hpp
        run: |
          curl -L -o jni/zygisk.hpp \
            https://raw.githubusercontent.com/topjohnwu/zygisk-module-sample/master/module/jni/zygisk.hpp

      - name: Update version in module.prop
        run: |
          VERSION="${{ inputs.version }}"
          # strip leading 'v' for versionCode calculation
          VER_CLEAN="${VERSION#v}"
          # convert v1.2.3 -> 1002003
          IFS='.' read -r MA MI PA <<< "$VER_CLEAN"
          VER_CODE=$(( MA * 1000000 + MI * 1000 + PA ))
          sed -i "s/^version=.*/version=${VERSION}/" module.prop
          sed -i "s/^versionCode=.*/versionCode=${VER_CODE}/" module.prop
          echo "Updated module.prop:"
          cat module.prop

      - name: Build all ABIs
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          mkdir -p zygisk build
          for ABI in arm64-v8a armeabi-v7a x86 x86_64; do
            cmake \
              -S jni -B "build/$ABI" \
              -DCMAKE_TOOLCHAIN_FILE="$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake" \
              -DANDROID_ABI="$ABI" \
              -DANDROID_PLATFORM="android-21" \
              -DANDROID_STL="c++_static" \
              -DCMAKE_BUILD_TYPE=Release \
              -G Ninja
            cmake --build "build/$ABI" --target magiskhidex
            cp "$(find build/$ABI -name libmagiskhidex.so)" "zygisk/${ABI}.so"
            echo "Built: zygisk/${ABI}.so"
          done

      - name: Package ZIP
        run: |
          ZIP="MagiskHideX-${{ inputs.version }}.zip"
          zip -r "$ZIP" META-INF/ module.prop customize.sh \
            post-fs-data.sh service.sh action.sh zygisk/
          echo "Packaged: $ZIP ($(du -h $ZIP | cut -f1))"

      - name: Commit version bump
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add module.prop
          git commit -m "chore: bump version to ${{ inputs.version }}" || true

      - name: Create and push tag
        run: |
          git tag "${{ inputs.version }}"
          git push origin HEAD "${{ inputs.version }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          name: MagiskHideX ${{ inputs.version }}
          body: |
            ## MagiskHideX ${{ inputs.version }}

            ${{ inputs.release_notes }}

            ### Installation
            1. Download the ZIP below
            2. Magisk Manager → Modules → Install from storage
            3. Reboot

            ### Compatibility
            - Magisk Alpha >= 26402 + Zygisk built-in **OR** NeoZygisk
            - Enforce DenyList: **DISABLED**
            - ABIs: `arm64-v8a` `armeabi-v7a` `x86_64` `x86`
          files: MagiskHideX-${{ inputs.version }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
